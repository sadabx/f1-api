name: Update F1 API

on:
  push:
    branches:
      - main  # Triggers the action every time you push to the main branch
    paths-ignore:
      - 'api/**' # CRITICAL: Prevents an infinite loop when the bot pushes data!
  schedule:
    - cron: '*/30 * * * *' # Still runs every 30 minutes automatically
  workflow_dispatch: # Keeps the manual run button active

jobs:
  update-api:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      # Install Pandas, Requests, and lxml for HTML scraping
      run: pip install requests pandas lxml bs4 html5lib

    - name: Run API Fetcher
      run: python update_api.py

    - name: Commit and Push API Data
      run: |
        git config --global user.name "API Bot"
        git config --global user.email "bot@github.com"
        # Create folder explicitly if it missed, preventing Git pathspec failures
        mkdir -p api
        git add api/
        git commit -m "Automated API Update: Official F1 Site Scraped" || echo "No changes to commit"
        git push
